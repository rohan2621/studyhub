name: StudyHub CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  quality:
    name: Lint, Type Check & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: ESLint
        run: npx eslint . --ext .ts,.tsx --max-warnings 0

      - name: Prettier check
        run: npx prettier --check "src/**/*.{ts,tsx}" "app/**/*.{ts,tsx}"

      - name: TypeScript
        run: npx tsc --noEmit

      - name: Jest tests
        run: npx jest --passWithNoTests --coverage --coverageThreshold='{"global":{"lines":70}}'

  build-staging:
    name: EAS Build — Staging
    runs-on: ubuntu-latest
    needs: quality
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}
      - name: EAS Build Staging
        run: eas build --profile staging --platform all --non-interactive
